<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Painel de Rotas · Rondolog & Saster</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    /* === VARIÁVEIS (idênticas ao original aprovado) === */
    :root {
      --bg:         #0e1117;
      --surface:    #161b27;
      --surface2:   #1c2333;
      --border:     #2a3347;
      --red:        #e53e3e;
      --red-light:  #fc8181;
      --red-bg:     #2d1515;
      --text:       #e2e8f0;
      --text-dim:   #a0aec0;
      --text-muted: #718096;
      --green:      #48bb78;
      --blue:       #4299e1;
      --orange:     #ed8936;
      --yellow:     #ecc94b;
      --mono:       'Share Tech Mono', monospace;
      --transition: all 0.2s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* === LOADING === */
    .loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 1000;
    }
    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* === ABAS === */
    .base-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      padding: 8px 20px 0;
      border-bottom: 1px solid var(--border);
    }
    .base-tab {
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 12px 12px 0 0;
      transition: all 0.2s;
    }
    .base-tab:hover { color: var(--text); background: var(--surface2); }
    .base-tab.active {
      color: var(--red-light);
      background: var(--bg);
      border-bottom: 2px solid var(--red);
    }

    /* === HEADER === */
    header {
      background: var(--surface);
      padding: 18px 20px 16px;
      position: sticky;
      top: 0;
      z-index: 99;
      backdrop-filter: blur(2px);
    }
    .header-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }
    .brand-eyebrow {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--red);
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .brand-title { font-size: 20px; font-weight: 700; letter-spacing: .4px; }
    .brand-title span { color: var(--red-light); }
    .header-controls { display: flex; align-items: center; gap: 12px; }
    .count-badge, .compact-toggle {
      font-family: var(--mono);
      font-size: 11px;
      background: var(--surface2);
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .compact-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .compact-toggle input {
      width: 32px; height: 16px;
      appearance: none;
      background: var(--border);
      border-radius: 20px;
      position: relative;
      cursor: pointer;
    }
    .compact-toggle input:checked { background: var(--red); }
    .compact-toggle input::before {
      content: "";
      width: 12px; height: 12px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 2px; left: 2px;
      transition: transform 0.2s;
    }
    .compact-toggle input:checked::before { transform: translateX(16px); }

    /* === BUSCA E ORDENAÇÃO === */
    .search-order-wrap {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }
    .search-wrap { position: relative; flex: 1; }
    .search-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }
    #search {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px 13px 44px;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    #search:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(229,62,62,.2);
    }
    #orderSelect {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 13px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      min-width: 140px;
    }

    /* === FILTROS === */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px auto 0;
      max-width: 880px;
      padding: 0 16px;
    }
    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-dim);
      transition: var(--transition);
    }
    .chip.active {
      background: var(--red-bg);
      border-color: var(--red);
      color: var(--red-light);
    }

    /* === CONTEÚDO PRINCIPAL === */
    .main { padding: 20px 16px 0; max-width: 1280px; margin: 0 auto; }
    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* === GRID DE CARDS === */
    .results-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    @media (min-width: 640px) {
      .results-grid { grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); }
    }

    /* === CARD (ESTILO ORIGINAL RESTAURADO) === */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      transition: var(--transition);
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      border-color: rgba(229,62,62,.6);
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
      transform: translateY(-2px);
    }
    .card-inner { display: flex; flex: 1; }
    .card-bar {
      width: 4px;
      border-radius: 2px 0 0 2px;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .card-body { padding: 14px 16px; flex: 1; }

    body.compact .card-body { padding: 10px 12px; }
    body.compact .pedido { font-size: 13px; margin-bottom: 6px; }
    body.compact .metadata { margin-top: 6px; padding-top: 6px; }

    .pedido {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 8px;
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 5px 8px;
    }
    .pedido-sep { color: var(--text-muted); font-weight: 600; }

    /* Badge de tipo (estilo original) */
    .route-badge {
      display: inline-block;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: 8px;
      vertical-align: middle;
      border: 1px solid transparent;
    }

    .nome-rota {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px 12px;
    }
    .rota-nome-principal {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: #f1f5f9;
      letter-spacing: 0.2px;
      word-break: break-word;
    }
    body.compact .rota-nome-principal { font-size: 12px; }

    /* Metadados (condutores, placas, viagens) */
    .metadata {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 11px;
      color: var(--text-dim);
    }
    .meta-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .meta-count-badge {
      background: var(--surface2);
      border-radius: 10px;
      padding: 2px 6px;
      font-size: 9px;
      font-weight: 600;
      margin-left: 2px;
      border: 1px solid var(--border);
    }
    .meta-placa {
      font-family: var(--mono);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      letter-spacing: 1px;
    }
    .condutor-list {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .condutor-name {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 10px;
    }
    .condutor-more, .placa-more {
      background: var(--surface2);
      color: var(--text-dim);
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 10px;
      cursor: help;
      border: 1px solid var(--border);
    }

    /* Viagem badge (exclusivo Saster, mas integrado ao estilo) */
    .viagem-badge {
      background: var(--surface2);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 11px;
      border: 1px solid var(--border);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .card-action {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      color: var(--text-muted);
      transition: color .2s;
      flex-shrink: 0;
    }
    .card:hover .card-action { color: var(--red-light); }

    mark {
      background: rgba(253,230,138,.2);
      color: #fde68a;
      border-radius: 3px;
      padding: 0 2px;
    }

    .no-result {
      text-align: center;
      padding: 60px 20px;
      background: var(--surface);
      border-radius: 24px;
      grid-column: 1 / -1;
    }

    /* Toast de cópia */
    .copied-toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%);
      background: #1a2035e6;
      backdrop-filter: blur(8px);
      color: var(--green);
      font-family: var(--mono);
      font-size: 11px;
      padding: 12px 24px;
      border-radius: 40px;
      border: 1px solid rgba(72,187,120,.4);
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      z-index: 999;
      display: flex;
      gap: 8px;
      white-space: nowrap;
    }
    .copied-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; }

    @media (max-width: 600px) {
      .search-order-wrap { flex-direction: column; }
      #orderSelect { width: 100%; }
    }
    @media (max-width: 480px) {
      .card-action { padding: 0 10px; }
      .copied-toast { font-size: 9px; padding: 8px 18px; }
      .chip { font-size: 10px; padding: 4px 10px; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div>Carregando dados...</div>
</div>

<div class="base-tabs">
  <button class="base-tab active" data-base="rondolog">🚛 RONDOLOG</button>
  <button class="base-tab" data-base="saster">📦 SASTER</button>
</div>

<header>
  <div class="header-top">
    <div>
      <div class="brand-eyebrow" id="baseSubtitle">Rondolog · 113 rotas</div>
      <div class="brand-title">BUSCADOR <span id="baseTitle">RONDOLOG</span></div>
    </div>
    <div class="header-controls">
      <div class="count-badge" id="countBadge">113 rotas</div>
      <label class="compact-toggle">
        <span>📦 Compacto</span>
        <input type="checkbox" id="compactModeToggle">
      </label>
    </div>
  </div>
  <div class="search-order-wrap">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Buscar origem, destino, placa ou condutor..." autocomplete="off">
    </div>
    <select id="orderSelect">
      <option value="padrao" selected>Padrão</option>
      <option value="origem">Origem (A-Z)</option>
      <option value="destino">Destino (A-Z)</option>
      <option value="tipo">Tipo</option>
    </select>
  </div>
</header>

<div class="filters" id="filterChips">
  <div class="chip active" data-type="all">Todas</div>
  <div class="chip" data-type="transferencia">🚚 Transferência</div>
  <div class="chip" data-type="coleta">📦 Coleta</div>
  <div class="chip" data-type="rota">🔄 Rota fixa</div>
</div>

<div class="main">
  <div class="section-label" id="sectionLabel">Todas as rotas</div>
  <div id="results" class="results-grid"></div>
</div>

<div class="copied-toast" id="toast">
  <span class="toast-dot"></span>NOME DA ROTA COPIADO
</div>

<script>
  (function() {
    // Configuração dos dados externos
    const DATA_URLS = {
      rondolog: './data/rondolog.json',
      saster: './data/saster.json'
    };
    const dataCache = { rondolog: null, saster: null };

    // Estado da aplicação
    let currentBase = 'rondolog';
    let currentData = [];
    let currentQuery = '';
    let currentType = 'all';
    let currentOrder = 'padrao';

    // Elementos DOM
    const loadingOverlay = document.getElementById('loadingOverlay');
    const baseSubtitle = document.getElementById('baseSubtitle');
    const baseTitle = document.getElementById('baseTitle');
    const countBadge = document.getElementById('countBadge');
    const filterChipsDiv = document.getElementById('filterChips');
    const searchInput = document.getElementById('search');
    const orderSelect = document.getElementById('orderSelect');
    const sectionLabel = document.getElementById('sectionLabel');
    const resultsContainer = document.getElementById('results');
    const toast = document.getElementById('toast');

    // Utilitários (idênticos ao original)
    function norm(s) { return s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase(); }
    function hl(text, q) {
      if (!q) return text;
      const nq = norm(q), nt = norm(text);
      let out = '', i = 0;
      while (i < text.length) {
        const idx = nt.indexOf(nq, i);
        if (idx === -1) { out += text.slice(i); break; }
        out += text.slice(i, idx) + '<mark>' + text.slice(idx, idx + nq.length) + '</mark>';
        i = idx + nq.length;
      }
      return out;
    }

    function getTipoColor(tipo) {
      if (tipo === 'coleta') return 'var(--blue)';
      if (tipo === 'transferencia') return 'var(--green)';
      return 'var(--orange)';
    }
    function getTipoLabel(tipo) {
      if (tipo === 'transferencia') return '🚚 Transferência';
      if (tipo === 'coleta') return '📦 Coleta';
      return '🔄 Rota fixa';
    }

    // Carrega dados via fetch (com cache)
    async function loadData(base) {
      if (dataCache[base]) return dataCache[base];
      try {
        const res = await fetch(DATA_URLS[base]);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        // Garante estrutura padronizada
        const processed = data.map(item => ({
          ...item,
          pedido: [item.origem, item.destino],
          condutor: item.condutores || null,
          placa: item.placas || null
        }));
        dataCache[base] = processed;
        return processed;
      } catch (err) {
        alert(`Erro ao carregar dados de ${base.toUpperCase()}. Verifique os arquivos JSON.`);
        return [];
      }
    }

    // Troca de base
    async function switchBase(base) {
      loadingOverlay.style.display = 'flex';
      currentBase = base;
      baseTitle.textContent = base === 'rondolog' ? 'RONDOLOG' : 'SASTER';
      
      currentData = await loadData(base);
      
      baseSubtitle.innerHTML = base === 'rondolog' 
        ? `Rondolog · ${currentData.length} rotas` 
        : `Saster · ${currentData.length} rotas`;
      
      filterChipsDiv.style.display = base === 'rondolog' ? 'flex' : 'none';
      
      currentQuery = ''; currentType = 'all'; currentOrder = 'padrao';
      searchInput.value = ''; orderSelect.value = 'padrao';
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      document.querySelector('.chip[data-type="all"]')?.classList.add('active');
      
      loadingOverlay.style.display = 'none';
      render();
    }

    // Ordenação (respeita o original)
    function sortRotas(arr, order) {
      const sorted = [...arr];
      if (order === 'origem') {
        sorted.sort((a,b) => a.origem.localeCompare(b.origem));
      } else if (order === 'destino') {
        sorted.sort((a,b) => a.destino.localeCompare(b.destino));
      } else if (order === 'tipo' && currentBase === 'rondolog') {
        const tipoOrder = { coleta: 1, transferencia: 2, rota: 3 };
        sorted.sort((a,b) => (tipoOrder[a.tipo]||99) - (tipoOrder[b.tipo]||99));
      }
      return sorted;
    }

    // Renderização principal (estilo exatamente igual ao original, com suporte a viagens)
    function render() {
      let filtered = currentData;
      const q = currentQuery;
      
      if (q) {
        const nq = norm(q);
        filtered = filtered.filter(r => 
          norm(r.nome).includes(nq) ||
          `${r.origem} ${r.destino}`.toLowerCase().includes(nq) ||
          (r.condutor && r.condutor.some(c => norm(c).includes(nq))) ||
          (r.placa && r.placa.some(p => norm(p).includes(nq)))
        );
      }
      
      if (currentBase === 'rondolog' && currentType !== 'all') {
        filtered = filtered.filter(r => r.tipo === currentType);
      }
      
      filtered = sortRotas(filtered, currentOrder);
      
      countBadge.textContent = filtered.length + ' rota' + (filtered.length !== 1 ? 's' : '');
      sectionLabel.innerHTML = q ? `Resultados para "${q}"` : 'Todas as rotas';
      
      if (!filtered.length) {
        resultsContainer.innerHTML = '<div class="no-result">🔍 Nenhuma rota encontrada.</div>';
        return;
      }
      
      resultsContainer.innerHTML = filtered.map(r => {
        const tipo = r.tipo || 'rota';
        const tipoColor = (currentBase === 'rondolog') ? getTipoColor(tipo) : 'var(--blue)';
        const condutores = r.condutor || [];
        const placas = r.placa || [];
        const viagens = r.viagens;
        const totalCond = condutores.length;
        const totalPlacas = placas.length;
        
        const condutoresHTML = condutores.length ? `
          <div class="condutor-list">
            ${condutores.slice(0,2).map(c => `<span class="condutor-name">${hl(c, q)}</span>`).join('')}
            ${totalCond > 2 ? `<span class="condutor-more" title="${condutores.slice(2).join(', ')}">+${totalCond-2}</span>` : ''}
          </div>
        ` : '';
        
        const placasHTML = placas.length ? `
          <span class="meta-placa">${hl(placas[0], q)}</span>
          ${totalPlacas > 1 ? `<span class="placa-more" title="${placas.slice(1).join(', ')}">+${totalPlacas-1}</span>` : ''}
        ` : '';
        
        const viagemHTML = viagens ? `
          <div class="meta-item">📊 <span class="viagem-badge">${viagens} viagens</span></div>
        ` : '';
        
        const metaHTML = (condutoresHTML || placasHTML || viagemHTML) ? `
          <div class="metadata">
            ${viagemHTML}
            ${condutoresHTML ? `<div class="meta-item">👤 ${condutoresHTML} <span class="meta-count-badge">${totalCond}</span></div>` : ''}
            ${placasHTML ? `<div class="meta-item">🚛 ${placasHTML} <span class="meta-count-badge">${totalPlacas}</span></div>` : ''}
          </div>
        ` : '';
        
        const tipoBadge = (currentBase === 'rondolog') 
          ? `<span class="route-badge" style="background:${tipoColor}20; border-color:${tipoColor}; color:${tipoColor}">${getTipoLabel(tipo)}</span>` 
          : '';
        
        return `
          <div class="card" data-nome="${r.nome}">
            <div class="card-inner">
              <div class="card-bar" style="background: ${tipoColor};"></div>
              <div class="card-body">
                <div class="pedido">
                  <span>${hl(r.origem, q)}</span>
                  <span class="pedido-sep">→</span>
                  <span>${hl(r.destino, q)}</span>
                  ${tipoBadge}
                </div>
                <div class="nome-rota">
                  <span class="rota-nome-principal">${hl(r.nome, q)}</span>
                </div>
                ${metaHTML}
              </div>
              <div class="card-action" title="Copiar nome da rota">📋</div>
            </div>
          </div>
        `;
      }).join('');
      
      document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => {
          navigator.clipboard.writeText(card.dataset.nome).then(() => {
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
          });
        });
      });
    }

    // Event Listeners
    document.querySelectorAll('.base-tab').forEach(tab => {
      tab.addEventListener('click', async () => {
        document.querySelectorAll('.base-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        await switchBase(tab.dataset.base);
      });
    });
    searchInput.addEventListener('input', e => { currentQuery = e.target.value; render(); });
    orderSelect.addEventListener('change', e => { currentOrder = e.target.value; render(); });
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentType = chip.dataset.type;
        render();
      });
    });

    // Modo compacto
    const compactToggle = document.getElementById('compactModeToggle');
    if (localStorage.getItem('rondologCompact') === 'true') {
      document.body.classList.add('compact');
      compactToggle.checked = true;
    }
    compactToggle.addEventListener('change', e => {
      document.body.classList.toggle('compact', e.target.checked);
      localStorage.setItem('rondologCompact', e.target.checked);
    });

    // Inicia com Rondolog
    switchBase('rondolog');
  })();
</script>
</body>
</html>
